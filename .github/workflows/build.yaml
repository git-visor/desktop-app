name: Build

on:
  push:
    branches: [ main, master, test-deployment ]
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0)
  pull_request:
    branches: [ main, master, test-deployment ]

jobs:
  # Job 1: Verify code quality
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run Typecheck
        run: npm run typecheck

  # Job 2: Build Executables for all platforms
  build-app:
    name: Build ${{ matrix.os }}
    needs: check
    if: startsWith(github.ref, 'refs/tags/') # Only run if a tag was pushed in this event
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build for Windows
        if: matrix.os == 'windows-latest'
        run: npm run build:win

      - name: Build for macOS
        if: matrix.os == 'macos-latest'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:mac
      - name: Test .dmg Installation
        if: matrix.os == 'macos-latest'
        run: |
          # Attach the .dmg file
          hdiutil attach dist/*.dmg
          
          # Copy the app to Applications folder
          cp -R /Volumes/Git\ Visor/Git\ Visor.app /Applications/
          
          # Open the app to verify it launches
          open /Applications/Git\ Visor.app
          
          # Wait for a few seconds to ensure it runs
          sleep 10
          
          # Check if the app is running
          pgrep -f "Git Visor" || (echo "App failed to launch" && exit 1)
          
          # Detach the .dmg
          hdiutil detach /Volumes/Git\ Visor

      # Upload the built artifacts (exe, dmg, AppImage) to the GitHub Action Run page
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.snap